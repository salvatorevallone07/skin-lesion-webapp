spring:
  application:
    name: skin-lesion-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skinlesion}
    username: ${SPRING_DATASOURCE_USERNAME:skinlesion}
    password: ${SPRING_DATASOURCE_PASSWORD:skinlesion}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

server:
  servlet:
    context-path: /

ml:
  service:
    base-url: ${ML_SERVICE_BASE_URL:http://localhost:8000}

storage:
  upload-dir: ${STORAGE_UPLOAD_DIR:/data/uploads}

logging:
  level:
    com.unipd.skinlesion: INFO
