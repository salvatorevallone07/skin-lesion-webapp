services:
  postgres:
    image: postgres:17
    container_name: skinlesion-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skinlesion}
      POSTGRES_USER: ${POSTGRES_USER:-skinlesion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skinlesion}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skinlesion} -d ${POSTGRES_DB:-skinlesion}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  ml-service:
    build: ./ml-service
    container_name: skinlesion-ml
    environment:
      MODEL_DIR: /app/model
    volumes:
      # Trained artifacts (model.pt + normalization.json) persist here
      - ./ml-service/model:/app/model
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); \" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  tomcat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skinlesion-tomcat
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-skinlesion}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-skinlesion}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skinlesion}
      ML_SERVICE_BASE_URL: http://ml-service:8000
      STORAGE_UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  pgdata:
  uploads:
